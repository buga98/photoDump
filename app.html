<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>PhotoDump</title>
    <link rel="stylesheet" href="style.css">
   <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
   <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e91e63">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon.png">
</head>
<body>
<div class="hearts">
    <span>💖</span>
    <span>💗</span>
    <span>💘</span>
    <span>💞</span>
    <span>💕</span>
</div>
<div class="topbar">💍 PhotoDump M&L</div>

<div class="container">
   <h3 id="welcome"></h3>

<!-- TABOVI -->
<div class="tabs">
  <button class="tab active" onclick="showTab('photos')">📸 Fotografije</button>
  <button class="tab" onclick="showTab('dedication')">💌 Posveta</button>
</div>

<!-- FOTOGRAFIJE -->
<div id="photosTab" class="tab-content active">

  <label class="upload-box">
    <div class="custom-upload">📷 Slikaj</div>
    <input type="file" accept="image/*" capture="environment" onchange="uploadFile(this.files)">
  </label>

  <label class="upload-box">
    <div class="custom-upload">🖼 Odaberi slike</div>
    <input type="file" accept="image/*" multiple onchange="uploadFile(this.files)">
  </label>

  <h3>Moje slike</h3>
  <div id="gallery"></div>

</div>

<div id="dedicationTab" class="tab-content">

  <div class="dedication-box">
    <textarea id="dedicationText" placeholder="Napiši posvetu mladencima ❤️"></textarea>
  </div>

  <button class="btn-primary" onclick="saveDedication()">
    💌 Dodaj posvetu
  </button>
<div id="successModal" class="modal">
  <div class="modal-box">
    <h3>💖 Hvala vam!</h3>
    <p id="successMessage"></p>
    <button onclick="closeSuccessModal()">Zatvori</button>
  </div>
</div>
</div>
<script type="module" src="script.js"></script>
<div id="toast"></div>
</body>
</html>
